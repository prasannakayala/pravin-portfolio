<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <rect width="400" height="280" fill="#1f2a3a"/>
  <rect width="400" height="280" fill="#e9a23b" opacity="0.06"/>
  <!-- Sky/ground -->
  <rect x="0" y="200" width="400" height="80" fill="#2c3a4f"/>
  <!-- Forklift body -->
  <rect x="150" y="120" width="110" height="60" rx="6" fill="#e9a23b"/>
  <rect x="160" y="90" width="50" height="40" rx="4" fill="#f4c172"/>
  <!-- Cabin frame -->
  <rect x="158" y="60" width="6" height="70" fill="#9aa5b1"/>
  <rect x="206" y="60" width="6" height="70" fill="#9aa5b1"/>
  <rect x="158" y="60" width="54" height="6" fill="#9aa5b1"/>
  <!-- Forks -->
  <rect x="255" y="150" width="60" height="6" fill="#c0c7cf"/>
  <rect x="255" y="165" width="60" height="6" fill="#c0c7cf"/>
  <!-- Pallet -->
  <rect x="300" y="140" width="40" height="35" fill="#a9744f"/>
  <line x1="300" y1="150" x2="340" y2="150" stroke="#8a5d3b" stroke-width="2"/>
  <line x1="300" y1="160" x2="340" y2="160" stroke="#8a5d3b" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="175" cy="190" r="20" fill="#222b38"/>
  <circle cx="175" cy="190" r="9" fill="#5b6675"/>
  <circle cx="235" cy="190" r="20" fill="#222b38"/>
  <circle cx="235" cy="190" r="9" fill="#5b6675"/>
  <!-- Worker figure -->
  <circle cx="100" cy="120" r="12" fill="#f4c172"/>
  <rect x="90" y="132" width="20" height="40" rx="6" fill="#3d6e8f"/>
  <rect x="84" y="172" width="12" height="28" fill="#22303f"/>
  <rect x="104" y="172" width="12" height="28" fill="#22303f"/>
  <!-- Hi-vis vest accent -->
  <rect x="92" y="136" width="16" height="20" fill="#e9a23b" opacity="0.7"/>
  <!-- Title text -->
  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f5f5f5" text-anchor="middle">Mobile Equipment Training</text>
  <text x="200" y="64" font-family="Arial, sans-serif" font-size="13" fill="#b8c0cc" text-anchor="middle">Emirates Global Aluminium, UAE</text>
</svg>
