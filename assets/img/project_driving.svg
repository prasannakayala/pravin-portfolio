  <rect x="310" y="132" width="20" height="40" rx="6" fill="#3d6e8f"/>
  <rect x="304" y="172" width="12" height="28" fill="#22303f"/>
  <rect x="324" y="172" width="12" height="28" fill="#22303f"/>
  <!-- Clipboard -->
